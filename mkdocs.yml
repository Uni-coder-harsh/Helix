site_name: Helix Engineering Portal
site_description: Internal Engineering and Architecture Portal for Project Helix
site_author: Helix Project Team

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search


nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Culture:
      - Constitution: culture/00-helix-constitution.md
  - Product Discovery & Definition:
      - Overview: 01-product/README.md
      - Project Charter: 01-product/00-project-charter.md
      - Vision: 01-product/01-vision.md
      - Mission: 01-product/02-mission.md
      - Product Philosophy: 01-product/03-product-philosophy.md
      - Problem Analysis: 01-product/04-problem-analysis.md
      - User Personas: 01-product/05-user-personas.md
      - User Journeys: 01-product/06-user-journeys.md
      - Functional Requirements: 01-product/07-functional-requirements.md
      - Non-Functional Requirements: 01-product/08-non-functional-requirements.md
      - Success Metrics: 01-product/09-success-metrics.md
      - Product Roadmap: 01-product/10-product-roadmap.md
      - Project Scope: 01-product/11-project-scope.md
      - Risk Analysis: 01-product/12-risk-analysis.md
  - Architecture: architecture.md
  - AI: ai.md
  - Infrastructure: infrastructure.md
  - API: api.md
  - Plugins: plugins.md
  - Datasets: datasets.md
  - Security: security.md
  - Operations: operations.md
  - Deployment: deployment.md
  - Roadmap: roadmap.md
  - Research: research.md
  - Contributing: contributing.md
